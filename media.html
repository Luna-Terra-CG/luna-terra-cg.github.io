<!DOCTYPE html>

<head>
  <title>Media</title>

  <link rel="stylesheet" href="colors.css">
<style>

:root {
  --accent: var(--maroon) !important;
  --accent-alt: color-mix(in oklab, var(--accent) 80%, var(--overlay2)) !important;
}
/* basics */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0px;
}
p, h4, h3 {
  margin: 0px;
}
a:link {
  color: var(--maroon);
}
a:visited {
  color: var(--rosewater);
}
a:hover {
  color: var(--rosewater);
}
a:active {
  color: var(--sky);
}
::-moz-selection {
  color: var(--base);
  background: var(--accent-alt);
}
::selection {
  color: var(--base);
  background: var(--accent-alt);
  background-color: var(--accent-alt) !important;
}

/* background */
.background {
  background: linear-gradient(165deg in oklab, color-mix(var(--base) 69%, var(--mantle) ), color-mix(var(--accent) 30%, var(--surface2)));
  position: fixed;
  top: 0px;
  bottom: 0px;
  right: 0px;
  left: 0px;
}
.background_stars {
  background-image: url("assets_hwbm/background.png");
  background-repeat: repeat;
  position: fixed;
  top: 0px;
  bottom: 0px;
  right: 0px;
  left: 0px;
}
.background_scanLines {
  background-image: url("assets/scanlines.png");
  background-repeat: repeat;
  opacity: 0.135;
  position: fixed;
  top: 0px;
  bottom: 0px;
  right: 0px;
  left: 0px;
}
.container {
  display: flex;
  width: 100%;
  height: 100%;
}

/* sidebar */
:root {
  --sidebar-padding-top: 13px;
  --sidebar-padding-bottom: 30px;
  --sidebar-padding-right: 24px;
  --sidebar-background: rgba(var(--base-rgb), 0.5);
}
.sidebar {
  border-top: 22px solid var(--accent-alt);
  bottom: 15%;
  position: absolute;
}
.sidebar_items {
  padding-top: 0px;
  padding-left: 16px;
  background: var(--sidebar-background);
  backdrop-filter: blur(5px);
  color: var(--text);
  width: 300px;
}
.sidebar_link {
  text-decoration: none;
  color: inherit !important;
}
.sidebar_index, .sidebar_blog, .sidebar_wiki, .sidebar_links, .sidebar_media, .sidebar_comms {
  margin-right: 2px;
}
.sidebar_index:hover, .sidebar_blog:hover, .sidebar_wiki:hover, .sidebar_links:hover, .sidebar_media:hover, .sidebar_comms:hover {
  outline: 2px solid var(--text);
}
.ghost_margin {
  height: var(--sidebar-padding-top);
  background: transparent;
}
.sidebar_text {
  margin-left: 10px;
  font-family: 'Source Code Pro';
  font-size: 24.5px;
  font-weight: bold;
  text-align: left;
  padding-top: 11px;
  padding-bottom: 11px;
}
.sidebar_seperator {
  height: 2px;
  max-height: 2px;
  min-height: 2px;
  background: var(--subtext1);
  margin-right: var(--sidebar-padding-right);
  margin-left: 10px;
}
.sidebar_icon {
  display: flex;
  float: right;
  height: 27px;
  width: 27px;
  margin-top: 13px;
  margin-right: var(--sidebar-padding-right);
  margin-left: 20px;
}
.sidebar_backarrow {
  padding-top: var(--sidebar-padding-bottom);
  padding-bottom: var(--sidebar-padding-bottom);
  padding-left: 13px;
  background: var(--sidebar-background);
  backdrop-filter: blur(5px);
  color: var(--text);
}
.sidebar_backarrow_icon {
  width: 38px;
}
/* change active tab color */
.sidebar_media {
  background: var(--accent-alt);
  color: var(--base);
  outline: 2px solid var(--accent-alt);
}
.sidebar_media:hover {
  outline: 2px solid var(--accent-alt);
}


</style>
</head>
